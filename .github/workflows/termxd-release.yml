name: termxd release

on:
  push:
    tags:
      - 'termxd-v*.*.*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Compute version (strip termxd-v prefix)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#termxd-v}" >> "$GITHUB_OUTPUT"

      - name: Create local semver tag for GoReleaser
        # GoReleaser validates that GORELEASER_CURRENT_TAG points to an actual
        # git tag on HEAD. The wire tag is `termxd-vX.Y.Z` but we want
        # `.Version` to resolve to plain `X.Y.Z` in asset names, release body,
        # and the `-X main.version=...` ldflag. Create a local (unpushed) tag
        # `vX.Y.Z` so the validation passes. The real remote tag stays
        # `termxd-vX.Y.Z` — nothing triggers android-release.yml.
        run: |
          git config user.email "bot@github-actions"
          git config user.name "termxd-release-bot"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "GoReleaser override" HEAD

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --config .goreleaser.yaml
          workdir: termxd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tag is termxd-vX.Y.Z; override so {{ .Version }} resolves to X.Y.Z.
          GORELEASER_CURRENT_TAG: v${{ steps.ver.outputs.version }}
