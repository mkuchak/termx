name: termxd release

on:
  push:
    tags:
      - 'termxd-v*.*.*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Compute version (strip termxd-v prefix)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#termxd-v}" >> "$GITHUB_OUTPUT"

      - name: Create local semver tag for GoReleaser's {{ .Version }}
        # GoReleaser validates that GORELEASER_CURRENT_TAG points to an actual
        # git tag on HEAD AND requires the tag to parse as semver. Our remote
        # wire tag is `termxd-vX.Y.Z` which fails semver parsing; we also want
        # `.Version` to resolve to clean `X.Y.Z` in ldflags + release metadata.
        # Create a local (unpushed, CI-only) `vX.Y.Z` tag so the validation
        # passes and the template strips the prefix naturally.
        run: |
          git config user.email "bot@github-actions"
          git config user.name "termxd-release-bot"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "GoReleaser override" HEAD

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          # The .goreleaser.yaml has `release.disable: true` — we publish
          # the GitHub Release manually below under the real `termxd-vX.Y.Z`
          # tag (the phone's TermxReleaseFetcher filters on that prefix).
          # Using `release.disable: true` rather than `--skip=publish` keeps
          # the archive-copy step enabled so the binaries land in dist/ at
          # their final `termx-linux-<arch>` names.
          args: release --clean --config .goreleaser.yaml
          workdir: termxd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.ver.outputs.version }}

      - name: Publish GitHub Release under termxd-v tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd termxd/dist
          ls -la
          gh release create "${GITHUB_REF_NAME}" \
            --title "termxd v${{ steps.ver.outputs.version }}" \
            --generate-notes \
            --target "${GITHUB_SHA}" \
            termx-linux-amd64 \
            termx-linux-arm64 \
            checksums.txt
