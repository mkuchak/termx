version: 2

project_name: termx

before:
  hooks:
    - go mod tidy

builds:
  - id: termx
    main: ./
    binary: termx
    env:
      - CGO_ENABLED=0
    flags:
      # Shell preexec/precmd invokes termx per command — keep cold start
      # fast and the binary reproducible.
      - -trimpath
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: binary
    name_template: "termx-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

git:
  tag_sort: -version:refname
  prerelease_suffix: "-"

release:
  # Skip GoReleaser's GitHub Release creation — termxd-release.yml's final
  # step does `gh release create` under the `termxd-vX.Y.Z` wire tag, which
  # is what the phone-side TermxReleaseFetcher filter expects. Binaries are
  # still archived into termxd/dist/ normally for that step to attach.
  disable: true
  github:
    owner: mkuchak
    name: termx
  prerelease: auto
  name_template: "termxd v{{ .Version }}"
  # Tags are prefixed termxd-vX.Y.Z; CI sets GORELEASER_CURRENT_TAG so
  # {{ .Version }} strips the prefix and resolves to plain X.Y.Z.
